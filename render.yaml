databases:
  - name: neighbourhood-fit-db
    plan: free
    databaseName: app
    user: app

services:
  - type: web
    name: neighbourhood-fit-web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    # Seeds the DB from committed seed files on every deploy (idempotent — skips if already seeded)
    preDeployCommand: "cd /app/backend && python seed.py"
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: neighbourhood-fit-db
          property: connectionString
      - key: NOMINATIM_USER_AGENT
        value: neighbourhood-fit-score/1.0 (open-source, brussels-pilot)
      - key: GROQ_API_KEY
        sync: false   # set manually in Render dashboard (never commit the real key)

services:
  - type: web
    name: neighbourhood-fit-web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false   # Supabase connection string — set manually in Render dashboard
      - key: NOMINATIM_USER_AGENT
        value: neighbourhood-fit-score/1.0 (open-source, brussels-pilot)
      - key: GROQ_API_KEY
        sync: false   # set manually in Render dashboard (never commit the real key)
